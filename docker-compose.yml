services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      DATABASE_PATH: /app/data/turtle.db
      LIVEKIT_URL: ws://livekit:7880
    ports:
      - "3000:3000"
    volumes:
      - turtle-data:/app/data
    depends_on:
      - livekit

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        bind_addresses:
          - ""
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: true
        keys:
          "${LIVEKIT_API_KEY:-devkey}": "${LIVEKIT_API_SECRET:-secret}"
        turn:
          enabled: ${LIVEKIT_TURN_ENABLED:-false}
          domain: "${LIVEKIT_TURN_DOMAIN:-voice.example.com}"
          tls_port: ${LIVEKIT_TURN_TLS_PORT:-5349}
          udp_port: ${LIVEKIT_TURN_UDP_PORT:-3478}
          external_tls: ${LIVEKIT_TURN_EXTERNAL_TLS:-false}
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "${LIVEKIT_TURN_UDP_PORT:-3478}:${LIVEKIT_TURN_UDP_PORT:-3478}/udp"
      - "${LIVEKIT_TURN_TLS_PORT:-5349}:${LIVEKIT_TURN_TLS_PORT:-5349}/tcp"

volumes:
  turtle-data:
